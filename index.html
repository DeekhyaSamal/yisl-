<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Advanced VR Culture Trainer</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-event-set-component@5.0.0/dist/aframe-event-set-component.min.js"></script>
    <script src="https://unpkg.com/aframe-proxy-event-component@2.1.0/dist/aframe-proxy-event-component.min.js"></script>
    
    <style>
      .main-ui { font-family: sans-serif; }
    </style>
  </head>
  <body>
    <a-scene library="inspector: true">
      
      <a-assets>
        <img id="tokyo-street" src="https://cdn.polyhaven.com/asset_img/primary/shibuya_station.jpg?height=720" crossorigin="anonymous">
        <audio id="audio-greet" src="https://www.asahi-net.or.jp/~re4m-idk/jpn/konnichiwa.mp3" crossorigin="anonymous"></audio>
        
        <a-mixin id="button" 
                 geometry="primitive: plane; width: 1.5; height: 0.5" 
                 material="color: #222; opacity: 0.8"
                 text="align: center; color: white; width: 4"
                 event-set__mouseenter="material.color: #EF2D5E"
                 event-set__mouseleave="material.color: #222"></a-mixin>
      </a-assets>

      <a-sky src="#tokyo-street" rotation="0 -90 0"></a-sky>

      <a-entity id="rig" position="0 1.6 0">
        <a-camera>
          <a-cursor fuse="true" fuse-timeout="1500" 
                    geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
                    material="color: #00FFF2; shader: flat">
            <a-animation begin="fusing" easing="ease-in" attribute="scale" fill="forwards" from="1 1 1" to="0.1 0.1 0.1" dur="1500"></a-animation>
          </a-cursor>
        </a-camera>
      </a-entity>

      <a-entity id="ui-panel" position="0 1.5 -3">
        
        <a-text value="MODULE: JAPANESE ETIQUETTE" position="0 1.2 0" align="center" width="6" font="exo2bold"></a-text>
        <a-text value="Goal: Master the Bow and Greeting" position="0 0.9 0" align="center" width="3" color="#CCC"></a-text>

        <a-entity id="bow-task" mixin="button" position="0 0.2 0" 
                  text="value: 1. PRACTICE BOWING"
                  onclick="triggerBow()">
        </a-entity>

        <a-entity id="greet-task" mixin="button" position="0 -0.5 0" 
                  material="color: #555; opacity: 0.5"
                  text="value: 2. HEAR GREETING (LOCKED); color: #888">
        </a-entity>

      </a-entity>

      <a-entity id="feedback-box" position="2.5 1.5 -2" rotation="0 -30 0">
        <a-plane width="2" height="1" color="#FFF" opacity="0.9">
          <a-text id="instruction-text" value="Look at the 'Bowing' button to begin your first lesson." 
                  color="#333" align="center" width="1.8" wrap-count="20"></a-text>
        </a-plane>
      </a-entity>

    </a-scene>

    <script>
      // Simple logic to simulate "training progress"
      function triggerBow() {
        const feedback = document.querySelector('#instruction-text');
        const greetBtn = document.querySelector('#greet-task');
        
        // Update Feedback
        feedback.setAttribute('value', 'Excellent! In Japan, a 15-degree bow is standard for greetings. Now, listen to the pronunciation.');
        
        // Unlock next step
        greetBtn.setAttribute('material', 'color: #222; opacity: 0.8');
        greetBtn.setAttribute('text', 'value: 2. PLAY KONNICHIWA; color: white');
        
        // Add click listener to the newly unlocked button
        greetBtn.addEventListener('click', function() {
          const audio = new Audio('https://www.asahi-net.or.jp/~re4m-idk/jpn/konnichiwa.mp3'); // Fallback trigger
          audio.play();
          feedback.setAttribute('value', 'Module Complete! You are ready for your visit.');
        });
      }
      
      // Hook up the first button manually for the click event
      document.querySelector('#bow-task').addEventListener('click', triggerBow);
    </script>
  </body>
</html>
