<!DOCTYPE html>
<html>
  <head>
    <title>VR Cultural Immersion Prototype</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.5/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <audio id="greet-snd" src="https://cdn.glitch.global/your-asset-path/konnichiwa.mp3"></audio>
      </a-assets>

      <a-entity environment="preset: forest; dressingAmount: 500; dressingColor: #701313; groundColor: #222; skyType: gradient; skyColor: #ffafaf"></a-entity>

      <a-entity id="rig" position="0 0 5">
        <a-camera>
          <a-cursor color="#FAFAFA"></a-cursor>
        </a-camera>
      </a-entity>

      <a-box position="-2 1 -3" color="#4CC3D9" 
             animation__click="property: rotation; to: 0 360 0; dur: 2000; startEvents: click">
        <a-text value="LANGUAGE: Hello" position="-0.7 1 0" color="black" width="4"></a-text>
        <a-text value="Konnichiwa" position="-0.7 0.7 0" color="white" width="6"></a-text>
      </a-box>

      <a-sphere position="2 1.25 -3" radius="0.75" color="#EF2D5E">
        <a-text value="TRADITION: Bowing" position="-0.8 1.2 0" color="black" width="4"></a-text>
        <a-text value="Tilt your camera down\nto show respect." position="-0.9 0.8 0" color="white" width="3"></a-text>
      </a-sphere>

      <a-plane position="0 2.5 -5" rotation="0 0 0" width="4" height="1" color="#7BC8A4">
        <a-text value="Welcome to Tokyo Training" align="center" color="#FFF"></a-text>
      </a-plane>

    </a-scene>
  </body>
</html>
